# Copy to 03-secrets.yaml and fill in real values. DO NOT commit the filled file.
#   cp 03-secrets.template.yaml 03-secrets.yaml  &&  edit  &&  kubectl apply -f 03-secrets.yaml
# (stringData lets you paste plain values; k8s base64-encodes them.)
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: attendee
type: Opaque
stringData:
  # ---- Django / app ----
  DJANGO_SECRET_KEY: "REPLACE"                 # any long random string
  CREDENTIALS_ENCRYPTION_KEY: "REPLACE"        # reuse the SAME key as Railway v2 so existing
                                               # login groups / stored creds decrypt (Fernet key)

  # ---- Database + Redis hosted on RAILWAY (use the PUBLIC URLs, not *.railway.internal) ----
  # Railway → Postgres service → Variables → DATABASE_PUBLIC_URL (host *.proxy.rlwy.net)
  DATABASE_URL: "postgres://postgres:REPLACE@REPLACE.proxy.rlwy.net:PORT/railway"
  # Railway → Redis service → Variables → REDIS_PUBLIC_URL
  REDIS_URL: "redis://default:REPLACE@REPLACE.proxy.rlwy.net:PORT"

  # ---- Object storage for recordings (S3 or Cloudflare R2) ----
  AWS_ACCESS_KEY_ID: "REPLACE"
  AWS_SECRET_ACCESS_KEY: "REPLACE"
  AWS_STORAGE_BUCKET_NAME: "REPLACE"
  # For R2: set AWS_ENDPOINT_URL to the R2 endpoint (no code change needed).
  # AWS_ENDPOINT_URL: "https://<account>.r2.cloudflarestorage.com"

  # ---- Transcription (if used) ----
  DEEPGRAM_API_KEY: "REPLACE"
  # NOTE: Postgres + Redis are on Railway now, so DO NOT apply 04-data.yaml,
  # and there is no postgres-secret. Reuse Railway v2's DB to inherit your
  # existing Project / API key / "Test" login group / superuser.
