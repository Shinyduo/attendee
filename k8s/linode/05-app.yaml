# Migrate job + web + worker + LoadBalancer service.
---
# Run migrations + collectstatic once. Re-run by deleting & re-applying this Job.
apiVersion: batch/v1
kind: Job
metadata:
  name: attendee-migrate
  namespace: attendee
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: ghcr.io/shinyduo/attendee:main
        command: ["bash", "-lc"]
        args:
        - "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
        envFrom:
        - configMapRef: { name: env }
        - secretRef:    { name: app-secrets }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendee-web
  namespace: attendee
  labels: { app: attendee-web }
spec:
  replicas: 1
  selector:
    matchLabels: { app: attendee-web }
  template:
    metadata:
      labels: { app: attendee-web }
    spec:
      serviceAccountName: web-service-account   # adhoc bots launch inline in web -> needs pod RBAC
      # Pin to the system node pool (Linode 4GB, pool-id 898133) which is tainted
      # dedicated=system:NoSchedule so bot pods never land here. Lets the bot pool
      # (898023) scale to 0 when idle.
      nodeSelector:
        lke.linode.com/pool-id: "898133"
      tolerations:
      - key: dedicated
        operator: Equal
        value: system
        effect: NoSchedule
      containers:
      - name: web
        image: ghcr.io/shinyduo/attendee:main
        command: ["gunicorn"]
        args:
        - "attendee.wsgi"
        - "--bind=0.0.0.0:8000"
        - "--workers=2"
        - "--timeout=120"
        - "--access-logfile=-"
        - "--error-logfile=-"
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef: { name: env }
        - secretRef:    { name: app-secrets }
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits:   { cpu: "1",    memory: "1Gi" }
        # X-Forwarded-Proto=https so Django (SECURE_SSL_REDIRECT) doesn't 301 the probe
        # to https:// (kubelet follows the redirect into https on the plain-HTTP port and fails).
        readinessProbe:
          httpGet:
            path: /
            port: 8000
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8000
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendee-worker
  namespace: attendee
  labels: { app: attendee-worker }
spec:
  replicas: 1
  selector:
    matchLabels: { app: attendee-worker }
  template:
    metadata:
      labels: { app: attendee-worker }
    spec:
      serviceAccountName: web-service-account   # scheduled bots launch from worker -> needs pod RBAC
      # Pin to the system node pool (see note on attendee-web above).
      nodeSelector:
        lke.linode.com/pool-id: "898133"
      tolerations:
      - key: dedicated
        operator: Equal
        value: system
        effect: NoSchedule
      containers:
      - name: worker
        image: ghcr.io/shinyduo/attendee:main
        command: ["celery"]
        # In kubernetes mode bots run in SEPARATE pods, so worker concurrency is safe
        # (the #797 shared-audio bug only affects in-process celery bots).
        args: ["-A", "attendee", "worker", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - configMapRef: { name: env }
        - secretRef:    { name: app-secrets }
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits:   { cpu: "1",    memory: "1Gi" }
---
# Public entry point. Linode provisions a NodeBalancer with a public IP for this Service.
apiVersion: v1
kind: Service
metadata:
  name: attendee-web-lb
  namespace: attendee
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "4"
spec:
  type: LoadBalancer
  selector: { app: attendee-web }
  ports:
  - name: http
    port: 80
    targetPort: 8000
